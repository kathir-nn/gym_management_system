# ==========================
# Server
# ==========================
server.port=8080

# =============================
# H2 DATABASE Config
# =============================
spring.datasource.url=jdbc:h2:mem:gymdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=ndbcka
spring.datasource.password=Gotogym@143

# ===============================
# JPA
# ===============================
spring.jpa.database-dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=never
# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console



spring.application.name=gym-Management

#====================================
#JSP
#====================================
spring.mcv.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
