spring.application.name=gym Management
# ==========================
# Server
# ==========================
server.port=8085

# =============================
# MSQL DATABASE Config
# =============================
spring.datasource.url=jdbc:mysql://localhost:3306/GYM_DB
spring.datasource.username=root
spring.datasource.password=root

#Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.database-dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


#====================================
#JSP
#====================================
spring.mcv.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
